name: Create Release

on:
  push:
    tags:
      - '*'  # Execute when create a tag

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Install go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.3'

      # 3. Compile binaries with version
      # CGO_ENABLED=0: static Linux binary, no glibc version tied to the CI image (works on older distros).
      - name: Build binaries
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION=${{ github.ref_name }} # Obtains tag name (vX.Y.Z)
          echo "Building with version: $VERSION"
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o agent-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o agent-windows-amd64.exe .
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o agent-darwin-amd64 .

      # musl build for Alpine Linux (glibc binary does not run on musl).
      - name: Build Linux musl binary
        run: |
          VERSION=${{ github.ref_name }}
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e CGO_ENABLED=0 \
            golang:1.23-alpine \
            go build -ldflags "-X main.Version=$VERSION" -o agent-linux-musl-amd64 .

      # 4. Create release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            agent-linux-amd64
            agent-linux-musl-amd64
            agent-windows-amd64.exe
            agent-darwin-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}